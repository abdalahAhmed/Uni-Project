services:
  - type: web
    name: university-display-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: gunicorn university_display.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: university_display.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
