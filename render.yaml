services:
  - type: web
    plan: free
    name: university-display-backend
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      echo "✅ MIGRATION DONE"
      python manage.py collectstatic --noinput
    startCommand: gunicorn university_display.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: university_display.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
